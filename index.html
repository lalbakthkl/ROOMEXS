<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ROOMEX</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- iOS support -->
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ROOMEX" />
    <link rel="apple-touch-icon" href="https://picsum.photos/180" />
  </head>
  <body class="bg-black">
    <div id="root">
      <div id="app-loading" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#fff;font-family:sans-serif;z-index:9999;transition:opacity 0.5s ease;">
        <div style="width:40px;height:40px;border:3px solid #333;border-top:3px solid #4f46e5;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;"></div>
        <div style="font-size:14px;letter-spacing:0.05em;opacity:0.8;margin-bottom:20px;">LOADING ROOMEX...</div>
        <button id="retry-app-btn" style="display:none;background:#4f46e5;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;">RETRY LOADING</button>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
      </div>
    </div>
    <script>
      console.log('Index.html loading script started');
      (function() {
        // Global error handlers
        window.addEventListener('error', function(event) {
          console.error('Runtime Error:', event.message, event.filename, event.lineno);
          const loadingEl = document.getElementById('app-loading');
          if (loadingEl) {
            const statusText = loadingEl.querySelector('div:nth-child(2)');
            if (statusText) statusText.textContent = 'ERROR LOADING APP';
          }
          
          const errorDisplay = document.createElement('div');
          errorDisplay.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;background:rgba(239, 68, 68, 0.9);color:white;padding:15px;z-index:99999;font-family:monospace;font-size:11px;max-height:30vh;overflow:auto;';
          errorDisplay.textContent = 'Error: ' + event.message + '\nAt: ' + event.filename + ':' + event.lineno;
          document.body.appendChild(errorDisplay);
        });

        window.addEventListener('unhandledrejection', function(event) {
          console.error('Promise Rejection:', event.reason);
        });

        // Show retry button after 8 seconds
        setTimeout(() => {
          const btn = document.getElementById('retry-app-btn');
          if (btn) {
            btn.style.display = 'block';
            btn.onclick = () => {
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                  for(let reg of regs) reg.unregister();
                  window.location.reload(true);
                });
              } else {
                window.location.reload(true);
              }
            };
          }
        }, 8000);

        // Polyfills
        try {
          window.global = window;
          if (!window.globalThis) window.globalThis = window;
          
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.configurable && (descriptor.writable === false || !descriptor.set)) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Polyfill error:', e);
        }

        // VH fix
        const setVH = () => {
          document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        };
        window.addEventListener('resize', setVH);
        setVH();

        // Register SW
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW Error:', err));
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
